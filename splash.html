<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background: #07070a; }
body {
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  font-family: -apple-system, 'Segoe UI', sans-serif;
}
.logo-text {
  font-size: 28px; font-weight: 900; letter-spacing: 2px;
  color: #e8b84b;
  text-transform: uppercase;
  animation: fadeIn 0.3s ease;
}
.sub {
  font-size: 10px; color: rgba(255,255,255,.25);
  letter-spacing: 4px; margin-top: 8px;
  text-transform: uppercase;
  animation: fadeIn 0.5s ease;
}
.loader {
  margin-top: 32px; width: 40px; height: 2px;
  background: rgba(232,184,75,.15); border-radius: 2px;
  overflow: hidden; animation: fadeIn 0.6s ease;
}
.loader-bar {
  height: 100%; width: 30%; background: #e8b84b;
  border-radius: 2px;
  animation: slide 1s ease-in-out infinite;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes slide { 0% { transform:translateX(-100%); } 100% { transform:translateX(400%); } }
</style>
</head>
<body>
  <div class="logo-text">Vaulted Desk</div>
  <div class="sub">Traders Vault</div>
  <div class="loader"><div class="loader-bar"></div></div>
</body>
</html>

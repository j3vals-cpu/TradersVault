name: Build Traders Vault

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build exe
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradersVault-Setup
          path: dist/*.exe
          retention-days: 30

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.3
          name: Traders Vault v1.5.3
          body: |
            Traders Vault v1.5.3 — Windows 10/11
            
            Trading panel, prop tracker, position sizing calculator, bot engine, strategy & news, dock mode, Discord integration, gains card, studio tools, OS-level click-through overlay, multi-monitor support.
            
            by J3 | Traders Vault
          files: |
            dist/Traders Vault Setup 1.5.3.exe
            dist/TradersVault-portable.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

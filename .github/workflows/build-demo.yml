name: Build Traders Vault Demo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-demo:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows demo exe
        run: npm run build:demo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload demo release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-latest
          name: Traders Vault Demo (Internal)
          body: "Internal demo build for testing. NOT for public distribution."
          files: |
            dist-demo/*.exe
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
